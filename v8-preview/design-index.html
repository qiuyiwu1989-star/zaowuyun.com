<!DOCTYPE html>
<html>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

</head>
<body>
<x-dc>
<helmet>
<title>设计系统总览 · 造物云 v8</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { margin:0; background:#F4F5F8; color:#15161C; font-family:'Noto Sans SC', system-ui, -apple-system, sans-serif; -webkit-font-smoothing:antialiased; line-height:1.7; }
  a { color:inherit; text-decoration:none; }
  ::selection { background:#5A4FE6; color:#fff; }
  .mono { font-family:'Space Grotesk', ui-monospace, monospace; }
  .idx-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  @media (max-width:900px){ .idx-grid{ grid-template-columns:1fr 1fr; } }
  @media (max-width:600px){ .idx-grid{ grid-template-columns:1fr; } nav[data-nav]{ padding:0 20px !important; } }
</style>
</helmet>

<div style="max-width:100%; overflow-x:clip; background:#F4F5F8;">

<nav data-nav style="position:sticky; top:0; z-index:60; display:flex; align-items:center; justify-content:space-between; gap:24px; padding:0 40px; height:64px; background:rgba(244,245,248,.82); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px); border-bottom:1px solid rgba(21,22,28,.07);">
  <span style="display:flex; align-items:center; gap:10px;">
    <span data-mark data-size="26" style="display:inline-flex;"></span>
    <span data-wm data-h="16" style="display:inline-flex; align-items:center; color:#15161C;"></span>
  </span>
  <span class="mono" style="font-size:12px; font-weight:600; letter-spacing:.1em; color:#8A8C96;">DESIGN SYSTEM</span>
</nav>

<header style="max-width:1180px; margin:0 auto; padding:70px 40px 20px;">
  <div class="mono" style="font-size:12px; font-weight:700; letter-spacing:.2em; color:#5A4FE6; margin-bottom:18px;">OVERVIEW · 系统总览</div>
  <h1 style="font-size:clamp(36px,4.6vw,54px); font-weight:700; letter-spacing:-.02em; line-height:1.16; margin:0 0 14px;">造物云 <span style="color:#5A4FE6;">设计系统</span></h1>
  <p style="font-size:16.5px; color:#5A5C68; line-height:1.7; max-width:640px; margin:0;">从品牌内核到可落地页面的一整套设计语言：理念、标志与 VI、设计令牌、组件与版式、成品页面与叙事动画。点击任意卡片进入对应文档。</p>
</header>

<section style="max-width:1180px; margin:0 auto; padding:28px 40px 72px;">
  <sc-for list="{{ groups }}" as="g" hint-placeholder-count="4">
    <div data-reveal style="opacity:0; transform:translateY(18px); transition:all .6s cubic-bezier(.2,.7,.2,1); margin-bottom:34px;">
      <div style="display:flex; align-items:baseline; gap:12px; margin-bottom:16px;"><span class="mono" style="font-size:12px; font-weight:700; color:#5A4FE6;">{{ g.no }}</span><h2 style="font-size:20px; font-weight:700; letter-spacing:-.01em; margin:0;">{{ g.label }}</h2><span class="mono" style="font-size:11px; color:#8A8C96; letter-spacing:.08em;">{{ g.en }}</span></div>
      <div class="idx-grid">
        <sc-for list="{{ g.items }}" as="it" hint-placeholder-count="3">
          <a href="{{ it.href }}" style="display:flex; flex-direction:column; gap:10px; background:#fff; border:1px solid rgba(21,22,28,.08); border-radius:18px; padding:22px; box-shadow:0 14px 34px -28px rgba(21,22,28,.22); transition:transform .2s, border-color .2s;" style-hover="transform:translateY(-3px); border-color:rgba(91,79,230,.4)">
            <span style="width:40px; height:40px; border-radius:11px; background:rgba(91,79,230,.1); color:#5A4FE6; display:inline-flex; align-items:center; justify-content:center;">{{ it.icon }}</span>
            <div style="font-size:16px; font-weight:700;">{{ it.title }}</div>
            <p style="font-size:13px; color:#5A5C68; line-height:1.6; margin:0; flex:1;">{{ it.desc }}</p>
            <span style="display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:#5A4FE6;">打开 <span style="font-size:14px;">→</span></span>
          </a>
        </sc-for>
      </div>
    </div>
  </sc-for>
</section>

</div>
</x-dc>
