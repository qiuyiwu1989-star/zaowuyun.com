<style>
:root{
  --bg:#FAF9F5; --bg-soft:#F0EEE6; --ink:#141413; --ink-soft:#3b3a37;
  --muted:#6f6e67; --muted-2:#9a988f; --line:rgba(20,20,19,.11); --line-2:rgba(20,20,19,.18);
  --clay:#B23A1E; --clay-soft:#f3e6df; --maxw:1180px;
  --serif:"Instrument Serif","Songti SC","Source Han Serif SC","Noto Serif SC",Georgia,serif;
  --sans:"Inter","PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.55;font-size:16px;padding:0 0 90px}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 40px}
a{color:inherit;text-decoration:none}
.serif{font-family:var(--serif);font-weight:400}
.label{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--clay);font-weight:500}

/* header */
.top{padding:64px 0 30px;border-bottom:1px solid var(--line)}
.top h1{font-family:var(--serif);font-weight:400;font-size:clamp(38px,5.2vw,68px);line-height:1.03;letter-spacing:-1px;margin-top:14px}
.top p{color:var(--ink-soft);font-size:18px;margin-top:18px;max-width:680px}

/* controls */
.bar{position:sticky;top:0;z-index:20;background:rgba(250,249,245,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 0;margin-bottom:6px}
.bar-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.seg{display:inline-flex;border:1px solid var(--line-2);border-radius:999px;overflow:hidden}
.seg button{font-family:var(--sans);font-size:14px;border:none;background:transparent;color:var(--muted);padding:9px 20px;cursor:pointer;transition:.18s}
.seg button.on{background:var(--ink);color:var(--bg)}
.count{font-size:13px;color:var(--muted-2)}

/* zone group */
.zone{margin-top:46px}
.zone-h{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--line-2);padding-bottom:12px;margin-bottom:4px}
.zone-h h2{font-family:var(--serif);font-weight:400;font-size:30px;letter-spacing:-.3px}
.zone-h .zn{font-size:13px;color:var(--muted-2)}
.zone-h .zd{margin-left:auto;font-size:13px;color:var(--muted-2)}

/* rows */
.row{display:grid;grid-template-columns:108px 1fr auto;gap:24px;align-items:baseline;padding:20px 0;border-bottom:1px solid var(--line);transition:.18s}
.row:hover{background:var(--bg-soft)}
.row .date{font-size:13px;color:var(--muted-2);font-variant-numeric:tabular-nums;padding-top:4px}
.row .main h3{font-family:var(--serif);font-size:23px;font-weight:400}
.row .main h3 a:hover{color:var(--clay)}
.row .main .note{font-size:14.5px;color:var(--muted);margin-top:6px;max-width:760px}
.row .main .tags{margin-top:10px;display:flex;gap:7px;flex-wrap:wrap}
.tag{font-size:11.5px;letter-spacing:.5px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:3px 11px;background:var(--bg)}
.tag.rec{color:var(--clay);border-color:var(--clay);background:var(--clay-soft)}
.tag.doc{color:#5b6b4f;border-color:#cdd6c2;background:#eef1e8}
.tag.live{color:#3a5a78;border-color:#c3d2e0;background:#e9f0f6}
.row .go{font-size:14px;color:var(--clay);font-weight:500;white-space:nowrap;padding-top:4px}
.row .go::after{content:" →"}
.row.muted .go{color:var(--muted-2)}

/* timeline view tweak */
.flat .zone-h{display:none}
.flat .zone{margin-top:0}

footer{margin-top:70px;padding-top:26px;border-top:1px solid var(--line);font-size:13px;color:var(--muted-2);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}

@media(max-width:760px){
  .wrap{padding:0 22px}
  .row{grid-template-columns:1fr;gap:6px}
  .row .date{padding-top:0}
  .row .go{padding-top:6px}
  .zone-h .zd{display:none}
}
</style>
</head>

const list=document.getElementById('list'), countEl=document.getElementById('count');
function tagHtml(tags){return (tags||[]).map(x=>{
  let c='tag'; if(x==='推荐'||x==='最新')c+=' rec'; else if(x==='文档')c+=' doc'; else if(x==='现役')c+=' live';
  return `<span class="${c}">${x}</span>`;}).join('');}
function rowHtml(it){
  const muted = (it.tags||[]).some(x=>x==='历史'||x==='现役')?' muted':'';
  return `<div class="row${muted}">
    <div class="date">${it.d}</div>
    <div class="main">
      <h3><a href="${it.f}">${it.t}</a></h3>
      <div class="note">${it.note}</div>
      <div class="tags">${tagHtml(it.tags)}</div>
    </div>
    <a class="go" href="${it.f}">打开</a>
  </div>`;}
function render(mode){
  countEl.textContent = `共 ${ITEMS.length} 条`;
  if(mode==='time'){
    const sorted=[...ITEMS].sort((a,b)=> a.d<b.d?1:a.d>b.d?-1:0);
    list.className='wrap flat';
    list.innerHTML=`<div class="zone"><div class="zone-h"></div>${sorted.map(rowHtml).join('')}</div>`;
    return;
  }
  list.className='wrap';
  list.innerHTML=ZONES.map(z=>{
    const xs=ITEMS.filter(i=>i.z===z).sort((a,b)=> a.d<b.d?1:a.d>b.d?-1:0);
    if(!xs.length)return'';
    const ds=xs.map(i=>i.d).sort();
    return `<section class="zone"><div class="zone-h">
        <h2>${z}</h2><span class="zn">${xs.length} 件</span>
        <span class="zd">${ds[0]} – ${ds[ds.length-1]}</span>
      </div>${xs.map(rowHtml).join('')}</section>`;
  }).join('');
}
document.getElementById('seg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));
  render(b.dataset.mode);
});
render('zone');
</script>
</body>
</html>
